version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:latest
    container_name: ai_call_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ai-call-network
    restart: always

  # Backend Service
  backend:
    build: ./backend
    container_name: ai_call_backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ai-call-intelligence
      - DB_REQUIRED=true
      # Pass through other keys from .env if needed, or use env_file
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - ai-call-network
    restart: on-failure

  # Frontend Service
  frontend:
    build: ./frontend
    container_name: ai_call_frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      # Ensure React app knows where to reach backend
    stdin_open: true # Important for React scripts in Docker
    networks:
      - ai-call-network
    restart: on-failure

volumes:
  mongo-data:

networks:
  ai-call-network:
    driver: bridge